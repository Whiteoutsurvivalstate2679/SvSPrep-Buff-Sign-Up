<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SVS PREP Buff Sign-Up</title>

<style>
:root{
  --bg:#0b1220;
  --panel:#111a2e;
  --text:#e7eefc;
  --muted:#93a4c7;
  --gold:#f5c542;
  --danger:#ff4d4d;
  --ok:#3ddc97;
  --border:rgba(255,255,255,0.08);
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* layout */
.container{max-width:1100px;margin:auto;padding:16px;}
.header{font-size:20px;font-weight:700;color:var(--gold);margin-bottom:10px}

/* grid slots */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
  gap:8px;
}

.slot{
  padding:10px;
  border:1px solid var(--border);
  text-align:center;
  cursor:pointer;
  border-radius:8px;
  background:var(--panel);
  font-size:13px;
}

.slot.taken{opacity:.4;cursor:not-allowed}
.slot.selected{outline:2px solid var(--gold)}
.slot.mine{border:1px solid var(--ok)}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary{background:var(--gold);color:#000;font-weight:700}

/* mobile */
@media(max-width:600px){
  .grid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>

<body>
<div class="container">

  <div class="header">SVS PREP Buff Sign-Up</div>

  <div id="summary"></div>

  <div id="slots" class="grid"></div>

  <br/>

  <input id="pseudo" placeholder="Pseudo" style="width:100%;padding:10px;margin-bottom:8px"/>
  <input id="playerId" placeholder="ID" style="width:100%;padding:10px;margin-bottom:8px"/>

  <select id="alliance" style="width:100%;padding:10px;margin-bottom:8px">
    <option value="SUN">SUN</option>
    <option value="CAT">CAT</option>
    <option value="ANG">ANG</option>
    <option value="FFS">FFS</option>
    <option value="OTHER">OTHER</option>
  </select>

  <input id="otherAlliance" placeholder="Autre alliance" style="display:none;width:100%;padding:10px;margin-bottom:8px"/>

  <button class="primary" onclick="confirm()">CONFIRMER</button>

  <p id="status"></p>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";

let slots = ["23:45","00:15","00:45","01:15","01:45","02:15","02:45"];
let currentDay = "mon";
let bookings = {};
let selectedSlot = null;

/* ---------------- API ---------------- */
async function load(){
  const res = await fetch(`${API_URL}?day=${currentDay}`);
  bookings = await res.json();
  render();
}

async function save(data){
  return fetch(API_URL,{
    method:"POST",
    body: JSON.stringify(data)
  }).then(r=>r.json());
}

/* ---------------- UI ---------------- */
function render(){
  const grid = document.getElementById("slots");
  grid.innerHTML = "";

  slots.forEach(s=>{
    const b = bookings[s];

    const div = document.createElement("div");
    div.className = "slot";

    if(b) div.classList.add("taken");
    if(selectedSlot === s) div.classList.add("selected");

    div.innerText = s;

    div.onclick = ()=>{
      if(b) return;
      selectedSlot = s;
      render();
    };

    grid.appendChild(div);
  });
}

async function confirm(){
  const pseudo = document.getElementById("pseudo").value.trim();
  const playerId = document.getElementById("playerId").value.trim();
  const allianceSel = document.getElementById("alliance").value;
  const other = document.getElementById("otherAlliance").value.trim();

  if(!pseudo || !playerId || !selectedSlot){
    return show("Champs manquants");
  }

  const alliance = allianceSel === "OTHER" ? other : allianceSel;

  const payload = {
    day: currentDay,
    slot: selectedSlot,
    pseudo,
    playerId,
    alliance,
    ts: Date.now()
  };

  const res = await save(payload);

  if(res.success){
    show("OK confirmé");
    selectedSlot = null;
    load();
  }else{
    show(res.error || "Erreur");
  }
}

function show(t){
  document.getElementById("status").innerText = t;
}

/* UI logic */
document.getElementById("alliance").addEventListener("change",(e)=>{
  document.getElementById("otherAlliance").style.display =
    e.target.value === "OTHER" ? "block":"none";
});

load();
</script>

</body>
</html>
